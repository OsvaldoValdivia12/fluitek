<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT 11 – Diagrama del Sistema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');

:root {
  --bg:        #0d1117;
  --panel:     #161b22;
  --border:    #30363d;
  --accent:    #f0a500;
  --accent2:   #1f6feb;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --belt:      #58a6ff;
  --pulley:    #c9d1d9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Source Sans 3', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}

header {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.eq-badge {
  background: var(--accent);
  color: #000;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 1.6rem;
  padding: 4px 18px;
  border-radius: 4px;
  letter-spacing: 2px;
}
header h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.date-badge {
  font-size: 0.78rem;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 32px 36px;
  width: 100%;
  max-width: 960px;
}
.card-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 28px;
}

.diagram-wrap {
  width: 100%;
  overflow: hidden;
}
svg {
  width: 100%;
  height: auto;
  display: block;
}

.legend {
  margin-top: 28px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px 24px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--muted);
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-head   { background: var(--accent); }
.dot-tail   { background: #e85d3a; }
.dot-defl   { background: #58d68d; }
.dot-cw     { background: var(--belt); }

.footer-note {
  margin-top: 20px;
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  max-width: 960px;
  width: 100%;
}
</style>
</head>
<body>

<header>
  <span class="eq-badge">CT 11</span>
  <h1>Diagrama General del Sistema</h1>
  <span class="date-badge">12/02/2026</span>
</header>

<div class="card">
  <div class="card-title">4. Diagrama / Esquema General — Equipo o Sistema a Intervenir</div>

  <div class="diagram-wrap">
    <svg viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="beltGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3a6186"/>
          <stop offset="100%" stop-color="#89f7fe"/>
        </linearGradient>
        <radialGradient id="pulleyShine" cx="38%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
        </radialGradient>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0,0 8,4 0,8" fill="#58a6ff"/>
        </marker>
        <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0,0 8,4 0,8" fill="#f0a500"/>
        </marker>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
          <feOffset dx="0" dy="0" result="blur"/>
          <feFlood flood-color="#58a6ff" flood-opacity="0.25"/>
          <feComposite in2="blur" operator="in"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Upper belt (carry side) -->
      <path d="M 820 245
               L 720 235
               Q 680 232 650 210
               L 300 100
               Q 180  70 140  72"
            stroke="url(#beltGrad)"
            stroke-width="8"
            stroke-linecap="round"
            fill="none"
            filter="url(#glow)"
            opacity="0.9"/>

      <!-- Lower belt (return side) -->
      <path d="M 820 265
               L 720 258
               Q 680 256 650 235
               L 300 122
               Q 180  92 140  94"
            stroke="#2a4a6b"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"
            opacity="0.6"/>

      <!-- Belt direction arrow -->
      <path d="M 540 155 L 430 125"
            stroke="#58a6ff"
            stroke-width="2.5"
            stroke-dasharray="5,3"
            marker-end="url(#arrowBlue)"
            opacity="0.7"/>

      <!-- Counterweight rope -->
      <line x1="472" y1="220" x2="472" y2="290"
            stroke="#8b949e" stroke-width="2.5" stroke-dasharray="4,3"/>
      <!-- Counterweight block -->
      <rect x="447" y="290" width="50" height="22" rx="3"
            fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5" opacity="0.9"/>
      <text x="472" y="305" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="9" fill="#e6edf3" font-weight="600">C-PESO</text>
      <line x1="472" y1="314" x2="472" y2="322"
            stroke="#58a6ff" stroke-width="2"
            marker-end="url(#arrowBlue)"/>

      <!-- ═══════════════════════
           PULLEYS
           ═══════════════════════ -->

      <!-- 1 · Polea CABEZA (antes Cola) — lado izquierdo, color ámbar -->
      <circle cx="140" cy="83" r="22" fill="#1a2232" stroke="#f0a500" stroke-width="2.5"/>
      <circle cx="140" cy="83" r="22" fill="url(#pulleyShine)"/>
      <text x="140" y="88" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="13" fill="#f0a500" font-weight="700">1</text>
      <text x="140" y="55" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="10" fill="#c9d1d9" font-weight="600">Polea Cabeza</text>

      <!-- Drive arrow at head (left side now) -->
      <path d="M 108 72 L 88 57"
            stroke="#f0a500" stroke-width="2.5"
            marker-end="url(#arrowAmber)"/>

      <!-- 2 · small deflector near left -->
      <circle cx="178" cy="100" r="14" fill="#1a2232" stroke="#58d68d" stroke-width="2"/>
      <circle cx="178" cy="100" r="14" fill="url(#pulleyShine)"/>
      <text x="178" y="105" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="11" fill="#58d68d" font-weight="700">2</text>

      <!-- 3 · Polea Deflect. Contra-peso Lado Este -->
      <circle cx="380" cy="140" r="18" fill="#1a2232" stroke="#58d68d" stroke-width="2"/>
      <circle cx="380" cy="140" r="18" fill="url(#pulleyShine)"/>
      <text x="380" y="145" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="12" fill="#58d68d" font-weight="700">3</text>
      <text x="380" y="170" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="9" fill="#c9d1d9" font-weight="600">P. Deflect.</text>
      <text x="380" y="181" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="9" fill="#c9d1d9">Ctra-peso E</text>

      <!-- 4 · Take-up / CW pulley (movable) -->
      <circle cx="472" cy="218" r="18" fill="#1a2232" stroke="#f0a500" stroke-width="2.5"/>
      <circle cx="472" cy="218" r="18" fill="url(#pulleyShine)"/>
      <text x="472" y="223" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="12" fill="#f0a500" font-weight="700">4</text>
      <text x="515" y="218" text-anchor="start"
            font-family="Source Sans 3,sans-serif" font-size="9.5" fill="#c9d1d9" font-weight="600">Polea Contra-peso</text>

      <!-- 5 · Polea Deflect. Contra-peso Lado Oeste -->
      <circle cx="560" cy="200" r="18" fill="#1a2232" stroke="#58d68d" stroke-width="2"/>
      <circle cx="560" cy="200" r="18" fill="url(#pulleyShine)"/>
      <text x="560" y="205" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="12" fill="#58d68d" font-weight="700">5</text>
      <text x="560" y="228" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="9" fill="#c9d1d9" font-weight="600">P. Deflect.</text>
      <text x="560" y="239" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="9" fill="#c9d1d9">Ctra-peso O</text>

      <!-- 6 · small deflector near right -->
      <circle cx="710" cy="238" r="14" fill="#1a2232" stroke="#58d68d" stroke-width="2"/>
      <circle cx="710" cy="238" r="14" fill="url(#pulleyShine)"/>
      <text x="710" y="243" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="11" fill="#58d68d" font-weight="700">6</text>

      <!-- 7 · Polea COLA (antes Cabeza) — lado derecho, color rojo -->
      <circle cx="820" cy="255" r="26" fill="#1a2232" stroke="#e85d3a" stroke-width="3"/>
      <circle cx="820" cy="255" r="26" fill="url(#pulleyShine)"/>
      <text x="820" y="261" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="14" fill="#e85d3a" font-weight="700">7</text>
      <text x="820" y="292" text-anchor="middle"
            font-family="Source Sans 3,sans-serif" font-size="10" fill="#c9d1d9" font-weight="600">Polea Cola</text>

      <!-- Idler tick marks -->
      <g stroke="#30363d" stroke-width="1.5" opacity="0.8">
        <line x1="240" y1="105" x2="240" y2="118"/>
        <line x1="310" y1="118" x2="310" y2="131"/>
        <line x1="440" y1="148" x2="440" y2="161"/>
        <line x1="610" y1="190" x2="610" y2="203"/>
        <line x1="680" y1="218" x2="680" y2="231"/>
        <line x1="760" y1="236" x2="760" y2="249"/>
      </g>

      <!-- Direction label -->
      <text x="505" y="148" text-anchor="middle"
            font-family="Rajdhani,sans-serif" font-size="9" fill="#58a6ff" letter-spacing="1.5"
            opacity="0.7">DIRECCIÓN DE TRANSPORTE →</text>

    </svg>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot dot-head"></div>
      <span>Polea Cabeza / Motriz (1)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot dot-tail"></div>
      <span>Polea Cola (7)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot dot-defl"></div>
      <span>Poleas Deflectoras (2, 3, 5, 6)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot dot-cw"></div>
      <span>Polea Contra-peso (4)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3a6186; border-radius:2px;"></div>
      <span>Correa / Belt</span>
    </div>
  </div>
</div>

<div class="footer-note">
  Equipo: CT 11 &nbsp;|&nbsp; Generado para Dashboard de Mantenimiento &nbsp;|&nbsp; 12/02/2026
</div>

</body>
</html>
